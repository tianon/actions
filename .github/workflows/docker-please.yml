name: docker-please

on:
  pull_request:
    paths:
      - docker-please/**
      - .github/workflows/docker-please.yml
  push:
    paths:
      - docker-please/**
      - .github/workflows/docker-please.yml
  schedule:
    - cron: 23 3 * * 0
  workflow_dispatch:

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - windows-2025
          - windows-2022
        # TODO https://github.com/tianon/temp/blob/4bc564681badac59a75aeb568ec437d7a8a93e6f/.github/workflows/docker-version.yml#L31 ?
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: tianon/actions/checkout/composite@HEAD
      - uses: ./docker-please
      - run: docker version
