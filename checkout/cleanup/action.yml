# explicit credential cleanup -- usable in two ways:
#   1. end-of-job cleanup (if: always()) for callers who set persist-credentials: true
#   2. proactive mid-job cleanup to scope credentials to only the steps that need them, then revoke them before continuing -- idempotent, so safe to call before post: too
# the Docker action (../action.yml) handles end-of-job cleanup automatically via post-entrypoint: but checkout/cleanup is still useful for the proactive mid-job case
#
# keep in sync with ../action.yml and ../composite/action.yml

name: 'Checkout Cleanup'
description: 'Remove credentials persisted by checkout/composite; only needed when persist-credentials: true'
inputs:

  path: {}

runs:
  using: composite
  steps:
    - shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: '"$GITHUB_ACTION_PATH/../cleanup.sh"'
