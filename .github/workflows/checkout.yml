name: checkout

on:
  pull_request:
    paths:
      - checkout/**
      - .github/workflows/checkout.yml
  push:
    paths:
      - checkout/**
      - .github/workflows/checkout.yml
  schedule:
    - cron: 0 0 * * 0
  workflow_dispatch:

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        runner:
          # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#choosing-github-hosted-runners
          # Docker actions are Linux-only; Windows/macOS coverage is in the test-composite job below
          - ubuntu-24.04
          - ubuntu-22.04
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      # ideally, this would just be "uses: ./checkout", but that's a chicken-and-egg that results in "Error: Can't find 'action.yml', 'action.yaml' or 'Dockerfile' under '/home/runner/work/actions/actions/checkout'. Did you forget to run actions/checkout before running your local action?"
      # the second-best would be "uses: tianon/actions/checkout@${{ github.sha }}" but that's *also* invalid because we don't get the "github" context here so we can't self-reference properly 🙃
      - name: bootstrap
        run: |
          mkdir -p .github/tmp
          wget -O .github/tmp/actions.tgz "https://github.com/$GITHUB_REPOSITORY/archive/$GITHUB_SHA.tar.gz"
          tar --extract --verbose --file .github/tmp/actions.tgz --directory .github/tmp --strip-components 1
          rm .github/tmp/actions.tgz
      - uses: ./.github/tmp/checkout
        with:
          fetch-depth: 3
          # "Error: Can't find 'action.yml', 'action.yaml' or 'Dockerfile' under '/home/runner/work/tianon-actions/tianon-actions/.github/tmp/checkout'. Did you forget to run actions/checkout before running your local action?" 😂
          clean: false
          # (if we let this "checkout" run the "clean" bits, it deletes our original checkout and thus the post-run step fails 🤦)
      - run: ls -laFh
      - run: git log --oneline
      - run: touch is-it-writeable checkout/is-it-writeable
      - run: |
          commits="$(git log --first-parent --oneline | wc -l)"
          if [ "$commits" -gt 3 ]; then
            echo >&2 'error: depth is busted'
            exit 1
          fi
      - run: ls -l checkout/checkout.sh .git # files we know should exist, to make sure the checkout actually worked

      # test path:
      - uses: ./checkout
        with:
          fetch-depth: 2
          path: test/checkout/subdirectory
      - run: ls -l test/checkout/subdirectory/checkout/checkout.sh
      - run: touch test/checkout/subdirectory/is-it-writeable
      - run: |
          commits="$(git -C test/checkout/subdirectory log --first-parent --oneline | wc -l)"
          if [ "$commits" -gt 2 ]; then
            echo >&2 'error: depth is busted'
            exit 1
          fi
      # test clean:
      - uses: ./checkout
        with:
          fetch-depth: 1
          path: test/checkout/subdirectory
      - run: |
          if [ -e test/checkout/subdirectory/is-it-writeable ]; then
            echo >&2 'error: clean is busted'
            exit 1
          fi

      # test outputs:
      - id: co-outputs
        uses: ./checkout
        with:
          path: test/checkout/outputs
      - run: |
          test -n '${{ steps.co-outputs.outputs.ref }}'
          test -n '${{ steps.co-outputs.outputs.commit }}'
          git -C test/checkout/outputs log -1 --format=%H | grep -qxF '${{ steps.co-outputs.outputs.commit }}'

      # test show-progress: false
      - uses: ./checkout
        with:
          path: test/checkout/no-progress
          show-progress: false
      - run: ls test/checkout/no-progress

      # test fetch-tags: true
      - uses: ./checkout
        with:
          path: test/checkout/fetch-tags
          fetch-tags: true
      - run: git -C test/checkout/fetch-tags tag

      # test filter: blob:none
      - uses: ./checkout
        with:
          path: test/checkout/filter
          filter: blob:none
      - run: git -C test/checkout/filter config remote.origin.partialclonefilter | grep -qxF blob:none

      # test persist-credentials: false
      - uses: ./checkout
        with:
          path: test/checkout/no-persist
          persist-credentials: false
      - run: |
          if git -C test/checkout/no-persist config --local --get-regexp '^includeif' 2>/dev/null | grep --quiet 'git-credentials-'; then
            echo >&2 'error: credentials were not cleaned up with persist-credentials: false'
            exit 1
          fi

      # test ref: refs/heads/main -- should create a local tracking branch
      - uses: ./checkout
        with:
          path: test/checkout/branch
          ref: refs/heads/main
      - run: |
          branch="$(git -C test/checkout/branch branch --show-current)"
          test "$branch" = 'main'

      # test fetch-depth: 0 -- all history
      - uses: ./checkout
        with:
          path: test/checkout/all-history
          fetch-depth: 0
      - run: |
          count="$(git -C test/checkout/all-history log --oneline | wc -l)"
          if [ "$count" -le 1 ]; then
            echo >&2 "error: expected multiple commits with fetch-depth: 0, got $count"
            exit 1
          fi

      # test fetch-depth: 0 with default ref (a SHA) -- verifies correct commit is checked out when FETCH_REF is a SHA
      - uses: ./checkout
        with:
          path: test/checkout/sha-depth0
          fetch-depth: 0
      - run: |
          got="$(git -C test/checkout/sha-depth0 rev-parse HEAD)"
          if [ "$got" != "$GITHUB_SHA" ]; then
            echo >&2 "error: expected HEAD=$GITHUB_SHA, got $got"
            exit 1
          fi

      # test sparse-checkout (cone mode, checkout/ dir only)
      - uses: ./checkout
        with:
          path: test/checkout/sparse
          sparse-checkout: checkout
      - run: |
          ls test/checkout/sparse/checkout/checkout.sh
          if [ -d test/checkout/sparse/.github ]; then
            echo >&2 'error: .github should not be present in sparse checkout'
            exit 1
          fi

      # test stub errors -- lfs: true should fail
      - id: stub-lfs
        uses: ./checkout
        with:
          path: test/checkout/stub-lfs
          lfs: true
        continue-on-error: true
      - run: |
          if [ '${{ steps.stub-lfs.outcome }}' != 'failure' ]; then
            echo >&2 'error: expected lfs stub to fail'
            exit 1
          fi

  test-composite:
    strategy:
      matrix:
        runner:
          # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#choosing-github-hosted-runners
          - ubuntu-24.04
          - ubuntu-22.04
          - macos-latest
          - windows-2025
          - windows-2022
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - name: bootstrap
        run: |
          mkdir -p .github/tmp
          wget -O .github/tmp/actions.tgz "https://github.com/$GITHUB_REPOSITORY/archive/$GITHUB_SHA.tar.gz"
          tar --extract --verbose --file .github/tmp/actions.tgz --directory .github/tmp --strip-components 1
          rm .github/tmp/actions.tgz
      - uses: ./.github/tmp/checkout/composite
        with:
          fetch-depth: 3
          clean: false
      - run: ls -laFh
      - run: git log --oneline
      - run: touch is-it-writeable checkout/is-it-writeable
      - run: |
          commits="$(git log --first-parent --oneline | wc -l)"
          if [ "$commits" -gt 3 ]; then
            echo >&2 'error: depth is busted'
            exit 1
          fi
      - run: ls -l checkout/checkout.sh .git

      # test path:
      - uses: ./checkout/composite
        with:
          fetch-depth: 2
          path: test/checkout/composite/subdirectory
      - run: ls -l test/checkout/composite/subdirectory/checkout/checkout.sh
      - run: touch test/checkout/composite/subdirectory/is-it-writeable
      - run: |
          commits="$(git -C test/checkout/composite/subdirectory log --first-parent --oneline | wc -l)"
          if [ "$commits" -gt 2 ]; then
            echo >&2 'error: depth is busted'
            exit 1
          fi

      # test clean:
      - uses: ./checkout/composite
        with:
          fetch-depth: 1
          path: test/checkout/composite/subdirectory
      - run: |
          if [ -e test/checkout/composite/subdirectory/is-it-writeable ]; then
            echo >&2 'error: clean is busted'
            exit 1
          fi

      # test outputs:
      - id: co-outputs
        uses: ./checkout/composite
        with:
          path: test/checkout/composite/outputs
      - run: |
          test -n '${{ steps.co-outputs.outputs.ref }}'
          test -n '${{ steps.co-outputs.outputs.commit }}'
          git -C test/checkout/composite/outputs log -1 --format=%H | grep -qxF '${{ steps.co-outputs.outputs.commit }}'

      # test fetch-depth: 0 with default ref (a SHA) -- verifies correct commit is checked out when FETCH_REF is a SHA
      - uses: ./checkout/composite
        with:
          path: test/checkout/composite/sha-depth0
          fetch-depth: 0
      - run: |
          got="$(git -C test/checkout/composite/sha-depth0 rev-parse HEAD)"
          if [ "$got" != "$GITHUB_SHA" ]; then
            echo >&2 "error: expected HEAD=$GITHUB_SHA, got $got"
            exit 1
          fi

      # test persist-credentials: true + explicit cleanup
      - id: co-persist
        uses: ./checkout/composite
        with:
          path: test/checkout/composite/persist
          persist-credentials: true
      - run: |
          git -C test/checkout/composite/persist config --local --get-regexp '^includeif' | grep -qF 'git-credentials-'
      - uses: ./checkout/cleanup
        if: always()
        with:
          path: test/checkout/composite/persist
      - run: |
          if git -C test/checkout/composite/persist config --local --get-regexp '^includeif' 2>/dev/null | grep --quiet 'git-credentials-'; then
            echo >&2 'error: cleanup failed to remove credentials'
            exit 1
          fi
