# https://github.com/actions/checkout/blob/9f265659d3bb64ab1440b03b12f4d47a24320917/action.yml
# composite/action.yml and cleanup/action.yml must stay in sync with this file; see composite/action.yml for the full sync contract

name: 'Checkout'
description: 'Ostensibly, checkout a Git repository'

inputs:

  repository:
    default: ${{ github.repository }}

  ref: {}

  token:
    default: ${{ github.token }}

  # TODO https://github.com/actions/checkout/blob/9f265659d3bb64ab1440b03b12f4d47a24320917/action.yml#L25-L36
  # ssh-key: not yet implemented -- Docker container model complicates key file injection; implementation also requires known_hosts management (including GitHub's implicit host fingerprint), cross-platform GIT_SSH_COMMAND construction, and strict key file permissions

  # TODO https://github.com/actions/checkout/blob/9f265659d3bb64ab1440b03b12f4d47a24320917/action.yml#L37-L41
  # ssh-known-hosts: not yet implemented -- depends on ssh-key (also not implemented)

  # TODO https://github.com/actions/checkout/blob/9f265659d3bb64ab1440b03b12f4d47a24320917/action.yml#L42-L47
  # ssh-strict: not yet implemented -- depends on ssh-key (also not implemented)

  # TODO https://github.com/actions/checkout/blob/9f265659d3bb64ab1440b03b12f4d47a24320917/action.yml#L48-L51
  # ssh-user: not yet implemented -- depends on ssh-key (also not implemented)

  persist-credentials:
    # upstream default: true -- credentials after checkout are rarely needed and are a security anti-pattern; set to true explicitly only if post-checkout git operations require authentication
    default: false

  path: {}

  clean:
    default: true

  filter: {}

  sparse-checkout: {}

  sparse-checkout-cone-mode:
    default: true

  fetch-depth:
    description: 'number of commits; 0 for all'
    default: 1

  fetch-tags:
    default: false

  show-progress:
    default: true

  # TODO https://github.com/actions/checkout/blob/9f265659d3bb64ab1440b03b12f4d47a24320917/action.yml#L83-L85
  # lfs: not yet implemented -- requires git-lfs in the Docker container image; supported in checkout/composite where git-lfs is available on GitHub-hosted runners

  # TODO https://github.com/actions/checkout/blob/9f265659d3bb64ab1440b03b12f4d47a24320917/action.yml#L86-L94
  # submodules: not yet implemented -- requires recursive authentication and fetch configuration per submodule repo

  set-safe-directory:
    default: true

  github-server-url: {}

outputs:

  ref:
    description: 'The branch, tag or SHA that was checked out'

  commit:
    description: 'The commit SHA that was checked out'

runs:
  # TODO https://github.com/actions/runner/issues/1478 -- convert to composite once post: is supported; checkout/composite will then be a pure pass-through stub
  # docker action (Linux-only); automatic credential cleanup via post-entrypoint
  # for non-Linux runners, use ./checkout/composite instead
  using: docker
  image: Dockerfile
  entrypoint: checkout.sh
  # TODO ideally post-if: inputs.persist-credentials != 'false' to skip cleanup entirely when credentials were never kept, but inputs.* is not available in post-if: context
  # https://github.com/orgs/community/discussions/65593
  post-entrypoint: cleanup.sh
  env:
    # https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions#runs-for-docker-container-actions:~:text=inputs%20using%20the-,INPUT_NUM%2DOCTOCATS,-and%20INPUT_OCTOCAT%2DEYE is cursed ("INPUT_FETCH-DEPTH" can't easily be used from bash 🙃)
    INPUT_FETCH_DEPTH: '${{ inputs.fetch-depth }}'
    INPUT_FETCH_TAGS: '${{ inputs.fetch-tags }}'
    INPUT_GITHUB_SERVER_URL: '${{ inputs.github-server-url }}'
    INPUT_PERSIST_CREDENTIALS: '${{ inputs.persist-credentials }}'
    INPUT_SET_SAFE_DIRECTORY: '${{ inputs.set-safe-directory }}'
    INPUT_SHOW_PROGRESS: '${{ inputs.show-progress }}'
    INPUT_SPARSE_CHECKOUT: '${{ inputs.sparse-checkout }}'
    INPUT_SPARSE_CHECKOUT_CONE_MODE: '${{ inputs.sparse-checkout-cone-mode }}'
