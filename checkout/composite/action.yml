# composite variant of ../action.yml -- mirrors all supported inputs and outputs exactly.
# keep in sync with ../action.yml and ../cleanup/action.yml:
#   - every input added to ../action.yml must be added here and mapped in the env: block
#   - every output added to ../action.yml must be added here with a value: expression
#   - all default changes in ../action.yml must be reflected here
#
# no post: step -- composite actions do not support post:
# TODO https://github.com/actions/runner/issues/1478 -- once post: is supported, checkout/ will convert to composite and this sub-action will become a pure pass-through stub
# with persist-credentials: false (the default), checkout.sh removes credentials before
# exiting and no separate cleanup step is needed
# callers who set persist-credentials: true must add an explicit cleanup step:
#
#   - uses: tianon/actions/checkout/cleanup@xxx
#     if: always()
#     with:
#       path: '...'   # only if path: was set on the checkout step

name: 'Checkout (composite)'
description: 'Checkout a Git repository; composite variant of ../action.yml (no post: step)'
inputs:

  repository:
    default: ${{ github.repository }}

  ref: {}

  token:
    default: ${{ github.token }}

  # TODO https://github.com/actions/checkout/blob/9f265659d3bb64ab1440b03b12f4d47a24320917/action.yml#L25-L36
  # ssh-key: not yet implemented -- Docker container model complicates key file injection; implementation also requires known_hosts management (including GitHub's implicit host fingerprint), cross-platform GIT_SSH_COMMAND construction, and strict key file permissions

  # TODO https://github.com/actions/checkout/blob/9f265659d3bb64ab1440b03b12f4d47a24320917/action.yml#L37-L41
  # ssh-known-hosts: not yet implemented -- depends on ssh-key (also not implemented)

  # TODO https://github.com/actions/checkout/blob/9f265659d3bb64ab1440b03b12f4d47a24320917/action.yml#L42-L47
  # ssh-strict: not yet implemented -- depends on ssh-key (also not implemented)

  # TODO https://github.com/actions/checkout/blob/9f265659d3bb64ab1440b03b12f4d47a24320917/action.yml#L48-L51
  # ssh-user: not yet implemented -- depends on ssh-key (also not implemented)

  persist-credentials:
    # callers who set true should follow with checkout/cleanup -- either via if: always() for end-of-job cleanup, or proactively mid-job to scope credentials to only the steps that need them (checkout/cleanup is idempotent, so calling it before post: is safe and intentionally supported even in a world where composite gains post: support)
    # TODO consider dropping this input and hardcoding INPUT_PERSIST_CREDENTIALS=false in the env: block to make the composite always self-cleaning at the cost of no credential persistence on non-Linux runners
    default: false # upstream default: true -- credentials after checkout are rarely needed and are a security anti-pattern; set to true explicitly only if post-checkout git operations require authentication

  path: {}

  clean:
    default: true

  filter: {}

  sparse-checkout: {}

  sparse-checkout-cone-mode:
    default: true

  fetch-depth:
    description: 'number of commits; 0 for all'
    default: 1

  fetch-tags:
    default: false

  show-progress:
    default: true

  # intentional divergence: LFS is supported in composite: https://github.com/tianon/actions/pull/8
  lfs:
    default: false

  submodules:
    description: 'whether to checkout submodules: `true` or `recursive`'
    default: false

  set-safe-directory:
    default: true

  github-server-url: {}

outputs:

  ref:
    description: 'The branch, tag or SHA that was checked out'
    value: ${{ steps.checkout.outputs.ref }}

  commit:
    description: 'The commit SHA that was checked out'
    value: ${{ steps.checkout.outputs.commit }}

runs:
  using: composite
  steps:
    - id: checkout
      shell: bash
      env:
        # unlike the non-composite action, we have to explicitly pass forward *all* the inputs (not just the ones that create pathological environment variable names)
        INPUT_CLEAN: ${{ inputs.clean }}
        INPUT_FETCH_DEPTH: ${{ inputs.fetch-depth }}
        INPUT_FETCH_TAGS: ${{ inputs.fetch-tags }}
        INPUT_FILTER: ${{ inputs.filter }}
        INPUT_GITHUB_SERVER_URL: ${{ inputs.github-server-url }}
        INPUT_LFS: ${{ inputs.lfs }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_PERSIST_CREDENTIALS: ${{ inputs.persist-credentials }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_SET_SAFE_DIRECTORY: ${{ inputs.set-safe-directory }}
        INPUT_SHOW_PROGRESS: ${{ inputs.show-progress }}
        INPUT_SPARSE_CHECKOUT: ${{ inputs.sparse-checkout }}
        INPUT_SPARSE_CHECKOUT_CONE_MODE: ${{ inputs.sparse-checkout-cone-mode }}
        INPUT_SUBMODULES: '${{ inputs.submodules }}'
        INPUT_TOKEN: ${{ inputs.token }}
      run: '"$GITHUB_ACTION_PATH/../checkout.sh"'
