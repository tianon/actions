name: setup-go

on:
  pull_request:
    paths:
      - setup-go/**
      - .github/workflows/setup-go.yml
  push:
    paths:
      - setup-go/**
      - .github/workflows/setup-go.yml
  schedule:
    - cron: 0 0 * * 0
  workflow_dispatch:

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        runner:
          # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#choosing-github-hosted-runners
          - ubuntu-24.04
          - ubuntu-22.04
          - macos-latest
          - windows-2025
          - windows-2022
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      # TODO uses: tianon/actions/checkout/composite@HEAD
      # (replace this tarball bootstrap once checkout/composite is available on HEAD;
      # ./checkout is a Docker action (Linux-only) and cannot run on Windows/macOS)
      - name: bootstrap
        run: |
          mkdir -p .github/tmp
          curl -fsSLo .github/tmp/actions.tgz "https://github.com/$GITHUB_REPOSITORY/archive/$GITHUB_SHA.tar.gz"
          tar --extract --gzip --file .github/tmp/actions.tgz --directory .github/tmp --strip-components 1
          rm .github/tmp/actions.tgz

      # test stable
      - id: stable
        uses: ./.github/tmp/setup-go
        with:
          go-version: stable
      - run: go version
      - env:
          GO_VERSION: ${{ steps.stable.outputs.go-version }}
        run: test -n "$GO_VERSION"

      # GOTOOLCHAIN=local is written to $GITHUB_ENV; verify it reached subsequent steps
      - run: test "$GOTOOLCHAIN" = local

      # test oldstable
      - uses: ./.github/tmp/setup-go
        with:
          go-version: oldstable
      - run: go version

      # test exact version + output value
      - id: exact
        uses: ./.github/tmp/setup-go
        with:
          go-version: 1.21.0
      - env:
          GO_VERSION: ${{ steps.exact.outputs.go-version }}
        run: |
          go version | grep -qF 'go1.21.0'
          test "$GO_VERSION" = '1.21.0'

      # test cache hit (same exact version — should skip API call and download)
      - uses: ./.github/tmp/setup-go
        with:
          go-version: 1.21.0
      - run: go version | grep -qF 'go1.21.0'

      # test architecture override — 386 on Linux (32-bit x86 runs natively on x86_64 Linux)
      - if: runner.os == 'Linux'
        uses: ./.github/tmp/setup-go
        with:
          go-version: stable
          architecture: '386'
      - if: runner.os == 'Linux'
        run: go env GOARCH | grep -qxF '386'

      # test partial version (latest patch for a given minor)
      - uses: ./.github/tmp/setup-go
        with:
          go-version: '1.21'
      - run: go version | grep -qE 'go1\.21\.'

      # test go-version-file: go.mod
      - id: gomod
        uses: ./.github/tmp/setup-go
        with:
          go-version-file: .github/tmp/setup-go/testdata/go.mod
      - env:
          GO_VERSION: ${{ steps.gomod.outputs.go-version }}
        run: |
          go version | grep -qF 'go1.21.0'
          test "$GO_VERSION" = '1.21.0'

      # test go-version-file: go.work
      - id: gowork
        uses: ./.github/tmp/setup-go
        with:
          go-version-file: .github/tmp/setup-go/testdata/go.work
      - env:
          GO_VERSION: ${{ steps.gowork.outputs.go-version }}
        run: |
          go version | grep -qF 'go1.21.1'
          test "$GO_VERSION" = '1.21.1'

      # test go-version-file: .tool-versions
      - id: toolversions
        uses: ./.github/tmp/setup-go
        with:
          go-version-file: .github/tmp/setup-go/testdata/.tool-versions
      - env:
          GO_VERSION: ${{ steps.toolversions.outputs.go-version }}
        run: |
          go version | grep -qF 'go1.21.2'
          test "$GO_VERSION" = '1.21.2'

      # test go-version-file: .go-version
      - id: goversion
        uses: ./.github/tmp/setup-go
        with:
          go-version-file: .github/tmp/setup-go/testdata/.go-version
      - env:
          GO_VERSION: ${{ steps.goversion.outputs.go-version }}
        run: |
          go version | grep -qF 'go1.21.3'
          test "$GO_VERSION" = '1.21.3'
